<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Modeler</title>
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="toolbar.css">
  <link rel="stylesheet" href="menu.css">
</head>
<body>

<canvas id="viewport"></canvas>

<div id="toolbar">
  <button class="tool-btn active" id="btn-select">Select</button>
  <button class="tool-btn" id="btn-move">Move (W)</button>
  <button class="tool-btn" id="btn-rotate">Rotate (R)</button>
  <button class="tool-btn" id="btn-scale">Scale (S)</button>
  <div class="tool-sep"></div>
  <button class="tool-btn export-btn" id="btn-export">⬇ Export</button>
</div>

<!-- Export menu -->
<div id="export-menu">
  <div class="menu-title">Export</div>

  <div class="export-scope">
    <button class="scope-btn active" id="scope-scene">Whole Scene</button>
    <button class="scope-btn" id="scope-selected">Selected Only</button>
  </div>

  <div class="menu-title" style="margin-top:6px">Format</div>
  <div class="menu-item" data-fmt="glb">  <span class="ic">◈</span> GLB <span class="fmt-desc">(binary, universal)</span></div>
  <div class="menu-item" data-fmt="gltf"> <span class="ic">◈</span> GLTF <span class="fmt-desc">(JSON, readable)</span></div>
  <div class="menu-item" data-fmt="obj">  <span class="ic">◈</span> OBJ <span class="fmt-desc">(legacy, wide support)</span></div>
  <div class="menu-item" data-fmt="stl">  <span class="ic">◈</span> STL <span class="fmt-desc">(3D printing)</span></div>
</div>

<div id="statusbar">
  <span>3D Modeler</span>
  <span class="sep">|</span>
  <span id="obj-count">Objects: 1</span>
  <span class="sep">|</span>
  <span id="sel-info">Nothing selected</span>
  <span class="sep">|</span>
  <span id="fps">-- fps</span>
  <span class="sep">|</span>
  <span id="cam-info">--</span>
</div>

<!-- Shift+A add menu -->
<div id="add-menu">
  <div class="menu-title">Add Mesh</div>
  <div class="menu-item" data-type="cube">     <span class="ic">■</span>Cube</div>
  <div class="menu-item" data-type="sphere">   <span class="ic">●</span>UV Sphere</div>
  <div class="menu-item" data-type="cylinder"> <span class="ic">⬡</span>Cylinder</div>
  <div class="menu-item" data-type="cone">     <span class="ic">▲</span>Cone</div>
  <div class="menu-item" data-type="torus">    <span class="ic">◎</span>Torus</div>
  <div class="menu-item" data-type="plane">    <span class="ic">▬</span>Plane</div>
</div>

<!-- Right-click context menu -->
<div id="context-menu">
  <div class="ctx-header" id="ctx-title">object_name</div>
  <div class="ctx-item" id="ctx-rename">  <span class="ctx-ic">✎</span> Rename</div>
  <div class="ctx-item" id="ctx-duplicate"><span class="ctx-ic">⧉</span> Duplicate</div>
  <div class="ctx-separator"></div>
  <div class="ctx-item danger" id="ctx-delete"><span class="ctx-ic">✕</span> Delete</div>
</div>

<div id="hierarchy">
  <div class="h-title">Scene Collection</div>
  <div id="h-list"></div>
</div>

<canvas id="gizmo" width="120" height="120"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module" src="main.js"></script>
</body>
</html>
